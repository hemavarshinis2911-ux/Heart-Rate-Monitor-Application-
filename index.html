<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Rate Monitor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>❤️ Heart Rate Monitor with Alert System</h1>

    <label>Enter Heart Rate (BPM):</label><br><br>

    <input type="number" id="heartRate" placeholder="Enter BPM"><br><br>

    <!-- ✅ FORM SUBMIT -->
    <form id="emailForm" action="https://formsubmit.co/hemavarshinis2911@gmail.com" method="POST">
        
        <!-- hidden fields -->
        <input type="hidden" name="_subject" value="Heart Rate Alert">
        <input type="hidden" name="_captcha" value="false">

        <!-- dynamic message field -->
        <input type="hidden" id="emailMessage" name="message">

        <button type="button" onclick="checkHeartRate()">Check</button>
    </form>

    <h2 id="result"></h2>
</div>

<script src="script.js"></script>

</body>
</html>
